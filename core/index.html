<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVL Tree Visualizer - Professional</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>AVL Tree Visualizer</h1>

        <div class="main-content">
            <div class="tree-section">
                <div id="tree-container"></div>
            </div>

            <div class="controls-section">
                <div class="controls">
                    <input type="number" id="node-value" placeholder="Enter value">
                    <button class="btn-primary" id="insert-btn">Insert</button>
                    <button class="btn-danger" id="delete-btn">Delete</button>
                    <button class="btn-secondary" id="reset-btn">Reset</button>
                </div>

                <div id="log"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
    <script src="avl.js"></script>
    <script src="visualizer.js"></script>
    <script src="app.js"></script>
</body>
